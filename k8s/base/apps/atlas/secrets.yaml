# secrets.yaml - Secret values for Atlas
# Replace REPLACE_ME placeholders before deploying.
# For ESO/OCI Vault integration, use ExternalSecret resources instead.
apiVersion: v1
kind: Secret
metadata:
  name: atlas-secrets
  namespace: apps
type: Opaque
stringData:
  APP_KEY: "REPLACE_ME"
  DB_PASSWORD: "REPLACE_ME"
  TYPESENSE_API_KEY: "REPLACE_ME"
  REVERB_APP_SECRET: "REPLACE_ME"
  REDIS_PASSWORD: "REPLACE_ME"
  AUTHENTIK_CLIENT_SECRET: "REPLACE_ME"
  AUTHENTIK_CLIENT_ID: "REPLACE_ME"
  AUTHENTIK_BASE_URL: "REPLACE_ME"
  # Optional: uncomment if using Sentry
  # SENTRY_LARAVEL_DSN: "REPLACE_ME"
