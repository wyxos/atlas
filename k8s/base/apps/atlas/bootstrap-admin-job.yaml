# bootstrap-admin-job.yaml - Bootstrap admin user job for Atlas
apiVersion: batch/v1
kind: Job
metadata:
  name: atlas-bootstrap-admin
  namespace: apps
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: altos
                    operator: In
                    values:
                      - "true"
      imagePullSecrets:
        - name: ocir-pull-secret
      containers:
        - name: bootstrap
          image: ocir.us-sanjose-1.oci.oraclecloud.com/axarjcg9zmg6/atlas-php:latest
          command:
            - php
            - artisan
            - app:setup
            - --name=Admin
            - --email=admin@atlas.rustybret.com
            - --generate-password
            - -n
          envFrom:
            - configMapRef:
                name: atlas-config
            - secretRef:
                name: atlas-secrets