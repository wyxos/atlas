# migration-job.yaml - Database migration job for Atlas
apiVersion: batch/v1
kind: Job
metadata:
  name: atlas-migration
  namespace: apps
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: altos
                    operator: In
                    values:
                      - "true"
      imagePullSecrets:
        - name: ocir-pull-secret
      containers:
        - name: migration
          image: ocir.us-sanjose-1.oci.oraclecloud.com/axarjcg9zmg6/atlas-php:latest
          command:
            - php
            - artisan
            - migrate
            - --force
          envFrom:
            - configMapRef:
                name: atlas-config
            - secretRef:
                name: atlas-secrets