# migration-job.yaml - Database migration job for Atlas
apiVersion: batch/v1
kind: Job
metadata:
  name: atlas-migration
  namespace: apps
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migration
          image: atlas-php:placeholder
          command:
            - php
            - artisan
            - migrate
            - --force
          envFrom:
            - configMapRef:
                name: atlas-config
            - secretRef:
                name: atlas-secrets