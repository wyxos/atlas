# redis-deployment.yaml - Redis deployment for Atlas
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-redis
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: atlas-redis
  template:
    metadata:
      labels:
        app: atlas-redis
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: altos
                    operator: In
                    values:
                      - "true"
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
            - --requirepass
            - $(REDIS_PASSWORD)
            - --appendonly
            - "yes"
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: atlas-secrets
                  key: REDIS_PASSWORD
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"