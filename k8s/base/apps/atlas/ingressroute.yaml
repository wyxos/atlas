# ingressroute.yaml - Traefik IngressRoute for Atlas
# cloudflared tunnels atlas.rustybret.com → localhost:80 → Traefik → atlas-web
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: atlas
  namespace: apps
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`atlas.rustybret.com`)
      middlewares:
        - name: https-headers
        - name: authentik-forward-auth
      services:
        - name: atlas-web
          port: 80
