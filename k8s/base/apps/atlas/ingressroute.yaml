# ingressroute.yaml - Traefik IngressRoute for Atlas
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: atlas
  namespace: apps
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`atlas.rustybret.com`)
      services:
        - name: atlas-web
          port: 80
  tls:
    certResolver: le