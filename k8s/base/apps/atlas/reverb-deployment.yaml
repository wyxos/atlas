# reverb-deployment.yaml - Laravel Reverb deployment for Atlas
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-reverb
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: atlas-reverb
  template:
    metadata:
      labels:
        app: atlas-reverb
    spec:
      imagePullSecrets:
        - name: ocir-pull-secret
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: altos
                    operator: In
                    values:
                      - "true"
      containers:
        - name: reverb
          image: ocir.us-sanjose-1.oci.oraclecloud.com/axarjcg9zmg6/atlas-php:latest
          command:
            - php
            - artisan
            - reverb:start
            - --host=0.0.0.0
          envFrom:
            - configMapRef:
                name: atlas-config
            - secretRef:
                name: atlas-secrets
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"