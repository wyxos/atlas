# configmap.yaml - Non-secret environment variables for Atlas
apiVersion: v1
kind: ConfigMap
metadata:
  name: atlas-config
  namespace: apps
data:
  APP_ENV: "production"
  APP_DEBUG: "false"
  APP_URL: "https://atlas.rustybret.com"
  SESSION_DRIVER: "redis"
  QUEUE_CONNECTION: "redis"
  CACHE_STORE: "redis"
  DB_CONNECTION: "mariadb"
  DB_HOST: "mariadb"
  DB_PORT: "3306"
  DB_DATABASE: "laravel"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  TYPESENSE_HOST: "typesense"
  TYPESENSE_PORT: "8108"
  TYPESENSE_PROTOCOL: "http"
  REVERB_HOST: "atlas.rustybret.com"
  REVERB_PORT: "8080"
  REVERB_SCHEME: "wss"
  AUTH_LOCAL_ENABLED: "false"
