; Atlas-specific PHP optimizations
; Add these to your php.ini or create a custom ini file

; Increase execution time for media processing
max_execution_time = 300

; Increase input time for uploads
max_input_time = 300

; Increase memory for large operations  
memory_limit = 2048M

; Increase POST/upload limits for media files
post_max_size = 500M
upload_max_filesize = 500M

; Increase input variables for complex forms
max_input_vars = 5000

; Optimize for PostgreSQL
pgsql.auto_reset_persistent = On

; Increase timeouts
default_socket_timeout = 300

; Enable JIT for better performance
opcache.jit = 1255
opcache.jit_buffer_size = 128M
