services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: atlas-php
    container_name: atlas-php
    restart: unless-stopped
    volumes:
      - ./:/var/www/html
    networks:
      - atlas-network
    depends_on:
      - mariadb
      - redis
      - typesense
    environment:
      - TYPESENSE_HOST=typesense
      - TYPESENSE_PORT=8108
      - TYPESENSE_PROTOCOL=http
      - TYPESENSE_API_KEY=xyz

  nginx:
    image: nginx:alpine
    container_name: atlas-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - atlas-network
    depends_on:
      - php
      - reverb

  mariadb:
    image: mariadb:10.11
    container_name: atlas-mariadb
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_USER: root
      MYSQL_PASSWORD: ""
      MYSQL_ROOT_PASSWORD: ""
      MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: "yes"
    volumes:
      - atlas-mariadb-data:/var/lib/mysql
    networks:
      - atlas-network
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: atlas-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - atlas-redis-data:/data
    networks:
      - atlas-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  typesense:
    image: typesense/typesense:27.0
    container_name: atlas-typesense
    restart: unless-stopped
    ports:
      - "8108:8108"
    volumes:
      - atlas-typesense-data:/data
    networks:
      - atlas-network
    environment:
      - TYPESENSE_API_KEY=xyz
      - TYPESENSE_ENABLE_CORS=true
      - TYPESENSE_DATA_DIR=/data
    healthcheck:
      test: ["CMD", "sh", "-c", "timeout 1 bash -c 'echo > /dev/tcp/localhost/8108' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 3

  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: atlas-reverb
    container_name: atlas-reverb
    restart: unless-stopped
    command: php artisan reverb:start
    env_file:
      - .env.docker
    volumes:
      - ./:/var/www/html
    networks:
      - atlas-network
    depends_on:
      - php
      - redis

  horizon:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: atlas-horizon
    container_name: atlas-horizon
    restart: unless-stopped
    command: php artisan horizon
    env_file:
      - .env.docker
    volumes:
      - ./:/var/www/html
    networks:
      - atlas-network
    depends_on:
      - php
      - redis
    environment:
      - QUEUE_CONNECTION=redis
      - CACHE_STORE=redis

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:5.2
    container_name: atlas-phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      - PMA_HOST=mariadb
      - PMA_USER=root
      - PMA_PASSWORD=
    networks:
      - atlas-network
    depends_on:
      - mariadb

volumes:
  atlas-mariadb-data:
  atlas-redis-data:
  atlas-typesense-data:

networks:
  atlas-network:
    driver: bridge