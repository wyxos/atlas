<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Extension Overlay Fixture</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: sans-serif;
      min-height: 200vh;
    }
    .card {
      width: 320px;
      margin-bottom: 24px;
    }
    img {
      width: 320px;
      height: 220px;
      object-fit: cover;
      display: block;
    }
  </style>
</head>
<body>
  <a class="card" href="https://www.deviantart.com/example/art/work-1">
    <img src="https://images-wixmp.com/f/sample-image-1.jpg" alt="anchored-media" />
  </a>
  <div class="card">
    <img src="https://images-wixmp.com/f/sample-image-2.jpg" alt="standalone-media" />
  </div>
</body>
</html>
