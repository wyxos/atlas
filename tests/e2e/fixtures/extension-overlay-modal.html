<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Extension Overlay Modal Fixture</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }
    .stage {
      width: 720px;
      margin: 0 auto;
      padding-top: 16px;
    }
    img {
      display: block;
      max-width: 100%;
      height: auto;
      user-select: none;
    }
    #small-image {
      width: 560px;
      cursor: zoom-in;
    }
    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.8);
      z-index: 99999;
    }
    .modal.open {
      display: flex;
    }
    #large-image {
      width: min(90vw, 980px);
      max-height: 88vh;
      object-fit: contain;
      cursor: zoom-in;
    }
  </style>
</head>
<body>
  <div class="stage">
    <img
      id="small-image"
      alt="fixture-small"
      src="https://images-wixmp.com/f/sample-image-small.jpg"
    />
  </div>

  <div id="modal" class="modal" role="dialog" aria-modal="true">
    <img
      id="large-image"
      alt="fixture-large"
      src="https://images-wixmp.com/f/sample-image-large.jpg"
    />
  </div>

  <script>
    window.__openClicks = 0;
    window.__zoomClicks = 0;

    const smallImage = document.getElementById('small-image');
    const modal = document.getElementById('modal');
    const largeImage = document.getElementById('large-image');

    smallImage.addEventListener('click', () => {
      window.__openClicks += 1;
      modal.classList.add('open');
    });

    largeImage.addEventListener('click', () => {
      window.__zoomClicks += 1;
    });
  </script>
</body>
</html>
